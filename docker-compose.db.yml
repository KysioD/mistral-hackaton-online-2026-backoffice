services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mistral-db
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mistral_backoffice_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - mistral-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d mistral_backoffice_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  mistral-network:
    driver: bridge