include:
  - docker-compose.db.yml

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mistral-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://prisma:password@postgres:5432/mistral_backoffice_db?schema=public"
      LLM_MODEL: ${LLM_MODEL:-ministral-8b-latest}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      VOXTRAL_MODEL: ${VOXTRAL_MODEL:-voxtral-mini-transcribe-realtime-2602}
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:prod"
    ports:
      - '3001:3000'
      - '8076:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - mistral-network

  frontend:
    build:
      context: ./frontend
    container_name: mistral-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mistral-network
