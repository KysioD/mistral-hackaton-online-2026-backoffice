include:
  - docker-compose.db.yml

services:
  backend:
    build:
      context: ./backend
    container_name: mistral-backend
    environment:
      DATABASE_URL: "postgresql://prisma:password@postgres:5432/mistral_backoffice_db?schema=public"
      LLM_MODEL: ${LLM_MODEL:-ministral-8b-latest}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"
    ports:
      - '3001:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mistral-network

  frontend:
    build:
      context: ./frontend
    container_name: mistral-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - mistral-network
